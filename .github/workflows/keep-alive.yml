name: Keep Render Backend Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render free tier from sleeping
    - cron: '*/14 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_BACKEND_URL }}/api/contact-info)
          echo "Backend ping status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Warning: Backend returned status $STATUS"
          else
            echo "Backend is alive!"
          fi
